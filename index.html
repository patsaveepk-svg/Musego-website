<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MuseGo</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Noto Sans Thai', sans-serif;
    margin: 0;
    background: #f8f6f3;
}

header {
    background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
    url('https://images.unsplash.com/photo-1587985064135-0366536eab42');
    color: white;
    text-align: center;
    padding: 70px 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

button {
    cursor: pointer;
}

.main-btn {
    padding: 12px 20px;
    border: none;
    background: #c89b6d;
    color: white;
    border-radius: 25px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 15px;
}

.card {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.tag {
    background: #eee;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 12px;
}

.card button {
    margin-top: 8px;
    width: 100%;
    padding: 8px;
    border: none;
    background: #8B5E3C;
    color: white;
    border-radius: 8px;
}

#trip-list li {
    background: white;
    padding: 10px;
    margin: 5px 0;
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
}

iframe {
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
<h1>MuseGo</h1>
<p>เที่ยวพิพิธภัณฑ์พระนครใน 1 วัน</p>
</header>

<div class="container">

<h2>เลือกสไตล์</h2>
<select id="style">
<option value="fun">สายสนุก</option>
<option value="history">สายความรู้</option>
<option value="chill">สายชิล</option>
</select>
<button onclick="generateTrip()" class="main-btn">จัดทริปอัตโนมัติ</button>

<h2>พิพิธภัณฑ์</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945">
<div class="card-content">
<h3>มิวเซียมสยาม</h3>
<div class="tag">#สนุก</div>
<button onclick="addToTrip('Museum Siam Bangkok')">เพิ่มลงทริป</button>
<button onclick="navigateTo('Museum Siam Bangkok')">นำทาง</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1549893074-7a4e0f7c5d35">
<div class="card-content">
<h3>พิพิธภัณฑสถานแห่งชาติ พระนคร</h3>
<div class="tag">#ความรู้</div>
<button onclick="addToTrip('National Museum Bangkok')">เพิ่มลงทริป</button>
<button onclick="navigateTo('National Museum Bangkok')">นำทาง</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1529429617124-95b109e86bb8">
<div class="card-content">
<h3>นิทรรศน์รัตนโกสินทร์</h3>
<div class="tag">#มัลติมีเดีย</div>
<button onclick="addToTrip('Rattanakosin Exhibition Hall')">เพิ่มลงทริป</button>
<button onclick="navigateTo('Rattanakosin Exhibition Hall')">นำทาง</button>
</div>
</div>

</div>

<h2>ทริปของฉัน</h2>
<ul id="trip-list"></ul>

<h2>แผนที่</h2>
<iframe id="mapFrame" width="100%" height="300" style="border:0; border-radius:12px;"></iframe>

</div>

<script>
let trip = JSON.parse(localStorage.getItem("trip")) || [];

function addToTrip(place) {
    if (!trip.includes(place)) {
        trip.push(place);
        updateMap(place);
        save();
    } else {
        alert("มีแล้ว!");
    }
}

function removeItem(index) {
    trip.splice(index, 1);
    save();
}

function save() {
    localStorage.setItem("trip", JSON.stringify(trip));
    renderTrip();
}

function renderTrip() {
    const list = document.getElementById("trip-list");
    list.innerHTML = "";

    trip.forEach((p, i) => {
        const li = document.createElement("li");
        li.innerHTML = p + " <button onclick='removeItem("+i+")'>ลบ</button>";
        list.appendChild(li);
    });
}

function generateTrip() {
    let style = document.getElementById("style").value;

    if(style === "fun") {
        trip = ["Museum Siam Bangkok","Rattanakosin Exhibition Hall"];
    }
    else if(style === "history") {
        trip = ["National Museum Bangkok","Rattanakosin Exhibition Hall"];
    }
    else {
        trip = ["Museum Siam Bangkok"];
    }

    updateMap(trip[0]);
    save();
}

function navigateTo(place) {
    const url = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(place);
    window.open(url, "_blank");
}

function updateMap(place) {
    const map = document.getElementById("mapFrame");
    map.src = "https://www.google.com/maps?q=" + encodeURIComponent(place) + "&output=embed";
}

renderTrip();
</script>

</body>
</html>
